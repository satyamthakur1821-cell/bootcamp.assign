<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Color Change</title>
</head>
<body>

    <h1 id="heading">Coding Student</h1>

    <button onClick="changeRed()">Change Text color to red</button>
    <button onClick="changeYellow()">Change Text color to yellow</button>

    <script>

        function changeRed() {
            // change text color of h1 to red
            document.getElementById("heading").style.color = "red";
        }

        function changeYellow() {
            // change text color of h1 to yellow
            document.getElementById("heading").style.color = "yellow";
        }

    </script>

</body>
</html>
