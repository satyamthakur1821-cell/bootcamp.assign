<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>
</head>
<body>

    <h1>Check your BMI</h1>
    <p>Enter your weight and height below to check your BMI results</p>

    <label>Put your weight in here (KG)</label><br><br>
    <input type="number" id="weight"><br><br>

    <label>And your height in here (CM)</label><br><br>
    <input type="number" id="height"><br><br>

    <button onclick="calculateBMI()">Calculate BMI</button>

    <h2 id="result"></h2>

    <script>
        function calculateBMI() {
            let weight = parseFloat(document.getElementById("weight").value);
            let heightCM = parseFloat(document.getElementById("height").value);

            // Convert cm to meters
            let height = heightCM / 100;

            let bmi = weight / (height * height);

            let status = "";

            if (bmi <= 18.4) {
                status = "Underweight";
            }
            else if (bmi >= 18.5 && bmi <= 24.9) {
                status = "Normal Weight";
            }
            else if (bmi >= 25 && bmi <= 29.9) {
                status = "Overweight";
            }
            else {
                status = "Obese";
            }

            document.getElementById("result").innerHTML =
                "Your BMI is " + bmi.toFixed(1) +
                " which means You are " + status;
        }
    </script>

</body>
</html>
